<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>交通實時報時器</title>
    <style>
        body { font-family: sans-serif; background-color: #ffffff; color: #000000; padding: 20px; }
        .route-card { border: 4px solid #000000; padding: 15px; margin-bottom: 15px; display: flex; justify-content: space-between; align-items: center; }
        .route-number { font-size: 48px; font-weight: 900; line-height: 1; }
        .route-dest { font-size: 20px; font-weight: bold; margin-top: 5px; }
        
        .eta-list { text-align: right; }
        .first-eta { font-size: 32px; font-weight: 900; display: block; }
        .second-eta { font-size: 18px; font-weight: normal; color: #555; display: block; margin-top: 4px; }
        
        #update-status { text-align: center; font-size: 14px; font-weight: bold; margin-bottom: 20px; border-bottom: 2px solid #000; padding-bottom: 10px; }
    </style>
</head>
<body>

    <div id="update-status">正在啟動...</div>

    <div class="route-card">
        <div><div class="route-number">A33X</div><div class="route-dest">往 機場</div></div>
        <div class="eta-list" id="kmb-a33x">讀取中...</div>
    </div>

    <div class="route-card">
        <div><div class="route-number">B3</div><div class="route-dest">往 深圳灣</div></div>
        <div class="eta-list" id="ctb-b3">讀取中...</div>
    </div>

    <div class="route-card">
        <div><div class="route-number">506</div><div class="route-dest">往 屯門碼頭</div></div>
        <div class="eta-list" id="mtr-506">讀取中...</div>
    </div>

    <div class="route-card">
        <div><div class="route-number">507</div><div class="route-dest">往 田景</div></div>
        <div class="eta-list" id="lrt-507">讀取中...</div>
    </div>

    <script>
        function formatMinutes(minutes) {
            if (isNaN(minutes) || minutes === null || minutes === undefined) return null;
            return minutes <= 0 ? "即將到達" : minutes + " 分鐘";
        }

        function renderETA(elementId, times) {
            const el = document.getElementById(elementId);
            const validTimes = times.filter(t => t !== null && t !== undefined && t !== "NaN" && t !== "");

            if (validTimes.length === 0) {
                el.innerHTML = '<span class="first-eta">暫無班次</span>';
                return;
            }

            let html = `<span class="first-eta">${validTimes[0]}</span>`;
            if (validTimes[1]) {
                html += `<span class="second-eta">${validTimes[1]}</span>`;
            }
            el.innerHTML = html;
        }

        async function updateAll() {
            document.getElementById('update-status').innerText = `最後更新: ${new Date().toLocaleTimeString()}`;

            // 1. A33X (九巴 GET 直連)
            try {
                const r = await fetch('https://data.etabus.gov.hk/v1/transport/kmb/eta/1D44677AEFBA8773/A33X/1');
                const d = await r.json();
                const times = d.data.slice(0, 2).map(i => {
                    const diff = Math.round((new Date(i.eta) - new Date()) / 60000);
                    return formatMinutes(diff);
                });
                renderETA('kmb-a33x', times);
            } catch (e) {
                renderETA('kmb-a33x', []);
            }

            // 2. B3 (城巴 GET 直連)
            try {
                const r = await fetch('https://rt.data.gov.hk/v2/transport/citybus/eta/CTB/001922/B3');
                const d = await r.json();
                const times = d.data.filter(i => i.dir === 'O').slice(0, 2).map(i => {
                    const diff = Math.round((new Date(i.eta) - new Date()) / 60000);
                    return formatMinutes(diff);
                });
                renderETA('ctb-b3', times);
            } catch (e) {
                renderETA('ctb-b3', []);
            }

            // 3. 506 (港鐵巴士 原生 POST 直連)
            try {
                const r = await fetch('https://rt.data.gov.hk/v1/transport/mtr/bus/getSchedule', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ language: 'zh', routeName: '506' })
                });
                const data = await r.json();
                const stop = data.busStop?.find(s => s.busStopId.includes("506-D010") && s.bus?.length > 0);
                const times = stop ? stop.bus.slice(0, 2).map(b => b.departureTimeText || b.arrivalTimeText || "即將開出") : [];
                renderETA('mtr-506', times);
            } catch (e) {
                console.error("506 錯誤:", e);
                renderETA('mtr-506', []);
            }

            // 4. 507 (輕鐵 GET 直連)
            try {
                const r = await fetch('https://rt.data.gov.hk/v1/transport/mtr/lrt/getSchedule?station_id=240');
                const d = await r.json();
                const trains = d.platform_list?.flatMap(p => p.route_list).filter(i => i.route_no === "507" && i.dest_ch === "田景");
                const times = trains.slice(0, 2).map(t => {
                    const num = parseInt(t.time_ch);
                    return isNaN(num) ? (t.time_ch === "即將到達" ? t.time_ch : null) : formatMinutes(num);
                });
                renderETA('lrt-507', times);
            } catch (e) {
                renderETA('lrt-507', []);
            }
        }

        // 初始化與每 30 秒自動更新
        updateAll();
        setInterval(updateAll, 30000);
    </script>
</body>
</html>
