<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>老鼠洲 / 兆麟 綜合報時器</title>
    <style>
        html, body { width: 100%; height: 100%; margin: 0; padding: 0; background-color: #ffffff; overflow: hidden; font-family: -apple-system, sans-serif; }
        #page-container { padding: 15px; width: 100%; box-sizing: border-box; }
        .route-card { border: 4px solid #000; padding: 12px; margin-bottom: 12px; display: flex; justify-content: space-between; align-items: center; }
        .route-info { font-weight: 900; }
        .route-number { font-size: 32px; display: block; }
        .eta-list { text-align: right; font-size: 20px; font-weight: bold; }
        .loading { font-size: 14px; color: #888; font-style: italic; }
        #update-status { text-align: center; font-size: 12px; margin-bottom: 10px; color: #555; }
    </style>
</head>
<body>

    <div id="page-container">
        <div id="update-status">正在啟動...</div>

        <div class="route-card">
            <div class="route-info"><span class="route-number">A33X</span>往 機場</div>
            <div class="eta-list" id="kmb-a33x"><div class="loading">載入中...</div></div>
        </div>

        <div class="route-card">
            <div class="route-info"><span class="route-number">B3</span>往 深圳灣</div>
            <div class="eta-list" id="ctb-b3"><div class="loading">載入中...</div></div>
        </div>

        <div class="route-card">
            <div class="route-info"><span class="route-number">506</span>往 屯門碼頭</div>
            <div class="eta-list" id="mtr-506"><div class="loading">載入中...</div></div>
        </div>

        <div class="route-card">
            <div class="route-info"><span class="route-number">507</span>往 田景</div>
            <div class="eta-list" id="lrt-507"><div class="loading">載入中...</div></div>
        </div>
    </div>

    <script>
        // 核心更新邏輯
        async function updateAll() {
            document.getElementById('update-status').innerText = `最後更新: ${new Date().toLocaleTimeString()}`;
            
            // 1. A33X (直連)
            fetch('https://data.etabus.gov.hk/v1/transport/kmb/eta/1D44677AEFBA8773/A33X/1')
                .then(r => r.json()).then(d => render(document.getElementById('kmb-a33x'), d.data.map(i => i.eta)));

            // 2. B3 (直連)
            fetch('https://rt.data.gov.hk/v2/transport/citybus/eta/CTB/001922/B3')
                .then(r => r.json()).then(d => render(document.getElementById('ctb-b3'), d.data.filter(i=>i.dir==='O').map(i => i.eta)));

            // 3. 506 (代理)
            fetch('https://api.codetabs.com/v1/proxy?quest=' + encodeURIComponent('https://rt.data.gov.hk/v1/transport/mtr/bus/getETA.php?route=506'))
                .then(r => r.json()).then(d => {
                    const times = d.bus.filter(i => i.busStopId === '250S').map(i => i.departureTimeInSecond);
                    render(document.getElementById('mtr-506'), times, true);
                });

            // 4. 507 (你的精準邏輯)
            fetch('https://rt.data.gov.hk/v1/transport/mtr/lrt/getSchedule?station_id=240')
                .then(r => r.json()).then(d => {
                    let items = [];
                    d.platform_list.forEach(p => {
                        if(p.route_list) p.route_list.forEach(t => {
                            if(t.route_no === "507" && t.dest_ch === "田景") items.push(t.time_ch);
                        });
                    });
                    document.getElementById('lrt-507').innerHTML = items.length ? items.map(t => `<div>${t}</div>`).join('') : '暫無班次';
                });
        }

        function render(el, times, isSec=false) {
            const now = new Date();
            const list = times.map(t => {
                const diff = isSec ? Math.round(t/60) : Math.round((new Date(t) - now)/60000);
                return diff <= 0 ? "即將抵達" : diff + " 分鐘";
            }).slice(0, 2);
            el.innerHTML = list.length ? list.map(t => `<div>${t}</div>`).join('') : '暫無班次';
        }

        updateAll();
        setInterval(updateAll, 60000); // 1分鐘更新
    </script>
</body>
</html>
