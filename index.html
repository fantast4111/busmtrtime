<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>巴士輕鐵到站 報時器</title>
    <style>
        html, body { width: 100%; height: 100%; margin: 0; padding: 0; background-color: #ffffff; overflow: hidden; }
        #page-container { color: #000000; font-family: sans-serif; box-sizing: border-box; padding: 15px; width: 100%; height: 100%; position: absolute; top: 0; left: 0; transition: transform 0.2s ease; }
        .rotate-btn { position: fixed; bottom: 15px; right: 15px; z-index: 9999; background-color: #000000; color: #ffffff; border: 3px solid #000000; padding: 10px 15px; font-size: 18px; font-weight: bold; cursor: pointer; box-shadow: 2px 2px 0px #888888; }
        .header { text-align: center; border-bottom: 5px solid #000000; padding-bottom: 8px; margin-bottom: 15px; }
        .header h1 { margin: 0; font-size: 38px; font-weight: 900; }
        .header .status { font-size: 14px; margin-top: 5px; font-weight: bold; }
        .route-card { border: 4px solid #000000; padding: 12px; display: flex; align-items: center; justify-content: space-between; margin-bottom: 15px; }
        .route-number { font-size: 54px; font-weight: 900; line-height: 1; }
        .route-dest { font-size: 18px; font-weight: bold; margin-top: 5px; }
        .eta-list { text-align: right; min-width: 160px; }
        .eta-item { font-size: 28px; font-weight: bold; }
        .eta-item.first { font-size: 42px; font-weight: 900; border-bottom: 2px solid #000000; }
        .loading { font-size: 18px; font-style: italic; color: #555555; }
    </style>
</head>
<body>

    <button class="rotate-btn" onclick="rotatePage()">旋轉 ↻</button>

    <div id="page-container">
        <div class="header">
            <h1>老鼠洲 / 兆麟 報時器</h1>
            <div class="status" id="update-status">正在載入數據...</div>
        </div>

        <div class="route-card">
            <div>
                <div class="route-number">A33X</div>
                <div class="route-dest">往 機場 (海榮路)</div>
            </div>
            <div class="eta-list" id="kmb-a33x"><div class="loading">讀取中...</div></div>
        </div>

        <div class="route-card">
            <div>
                <div class="route-number">B3</div>
                <div class="route-dest">往 深圳灣口岸</div>
            </div>
            <div class="eta-list" id="ctb-b3"><div class="loading">讀取中...</div></div>
        </div>

        <div class="route-card">
            <div>
                <div class="route-number">506</div>
                <div class="route-dest">往 屯門碼頭 (兆麟總站)</div>
            </div>
            <div class="eta-list" id="mtr-506"><div class="loading">讀取中...</div></div>
        </div>

        <div class="route-card">
            <div>
                <div class="route-number">507</div>
                <div class="route-dest">往 田景 (兆麟站 240)</div>
            </div>
            <div class="eta-list" id="lrt-507"><div class="loading">讀取中...</div></div>
        </div>
    </div>

    <script>
        const KMB_STOP_ID = "1D44677AEFBA8773"; 
        const CTB_STOP_ID = "001922";            
        const MTR_BUS_ROUTE = "506";           
        const LRT_STATION_ID = "240"; 

        const PROXY = "https://api.allorigins.win/raw?url=";

        // --- 旋轉邏輯 ---
        let currentAngle = 0;
        function rotatePage() {
            currentAngle = (currentAngle + 90) % 360;
            const container = document.getElementById('page-container');
            if (currentAngle === 0) {
                container.style.transform = "none"; container.style.width = "100%"; container.style.height = "100%"; container.style.left = "0"; container.style.top = "0";
            } else if (currentAngle === 90) {
                container.style.transform = "rotate(90deg)"; container.style.transformOrigin = "top left"; container.style.width = "100vh"; container.style.height = "100vw"; container.style.left = "100vw"; container.style.top = "0";
            } else if (currentAngle === 180) {
                container.style.transform = "rotate(180deg)"; container.style.transformOrigin = "center center"; container.style.width = "100%"; container.style.height = "100%"; container.style.left = "0"; container.style.top = "0";
            } else if (currentAngle === 270) {
                container.style.transform = "rotate(270deg)"; container.style.transformOrigin = "top left"; container.style.width = "100vh"; container.style.height = "100vw"; container.style.left = "0"; container.style.top = "100vh";
            }
        }

        // --- 總體抓取排程 ---
        async function fetchAllETA() {
            document.getElementById('update-status').innerText = "正在更新 (1分鐘/次)...";
            await Promise.all([
                updateKMB_A33X().catch(e => document.getElementById('kmb-a33x').innerHTML = `<div class="loading">載入失敗</div>`),
                updateCTB_B3().catch(e => document.getElementById('ctb-b3').innerHTML = `<div class="loading">載入失敗</div>`),
                updateMTR_506_Schedule().catch(e => document.getElementById('mtr-506').innerHTML = `<div class="loading">載入失敗</div>`),
                updateLRT_507_Schedule().catch(e => document.getElementById('lrt-507').innerHTML = `<div class="loading">載入失敗</div>`)
            ]);
            const now = new Date();
            document.getElementById('update-status').innerText = `最後更新: ${now.getHours().toString().padStart(2, '0')}:${now.getMinutes().toString().padStart(2, '0')}:${now.getSeconds().toString().padStart(2, '0')}`;
        }

        // 1. 九巴 A33X
        async function updateKMB_A33X() {
            const el = document.getElementById('kmb-a33x');
            const response = await fetch(`https://data.etabus.gov.hk/v1/transport/kmb/eta/${KMB_STOP_ID}/A33X/1`);
            const jsonResult = await response.json();
            const currentTime = new Date(jsonResult.generated_timestamp);

            const etas = (jsonResult.data || [])
                .map(item => {
                    if (!item.eta) return null;
                    const diff = Math.round((new Date(item.eta) - currentTime) / 60000);
                    if (diff < -1) return null; 
                    return diff <= 0 ? "即將抵達" : `${diff} 分鐘`;
                })
                .filter(item => item !== null).slice(0, 2);

            renderETAList(el, etas);
        }

        // 2. 城巴 B3 
        async function updateCTB_B3() {
            const el = document.getElementById('ctb-b3');
            const targetUrl = `https://rt.data.gov.hk/v2/transport/citybus/eta/CTB/${CTB_STOP_ID}/B3`;
            const response = await fetch(`${PROXY}${encodeURIComponent(targetUrl)}`);
            const jsonResult = await response.json();
            
            const currentTime = new Date();
            const etas = (jsonResult.data || [])
                .filter(item => item.dir === "O" || item.dir === "Outbound") 
                .map(item => {
                    if (!item.eta) return null;
                    const busTime = new Date(item.eta);
                    
                    if (isNaN(busTime.getTime())) {
                        return item.eta.substring(11, 16); 
                    }

                    const diffMin = (busTime - currentTime) / 60000;
                    if (diffMin < -2.0) return null; 
                    
                    const minutesLeft = Math.round(diffMin);
                    return minutesLeft <= 0 ? "即將抵達" : `${minutesLeft} 分鐘`;
                })
                .filter(item => item !== null).slice(0, 2);

            renderETAList(el, etas);
        }

        // 3. 港鐵巴士 506 (POST)
        async function updateMTR_506_Schedule() {
            const el = document.getElementById('mtr-506');
            const targetUrl = `https://rt.data.gov.hk/v1/transport/mtr/bus/getSchedule`;
            
            const response = await fetch(`${PROXY}${encodeURIComponent(targetUrl)}`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ route: MTR_BUS_ROUTE })
            });
            const jsonResult = await response.json();
            
            const now = new Date();
            let busTimes = [];

            if (jsonResult.bus_schedule) {
                busTimes = jsonResult.bus_schedule
                    .filter(item => item.busStopId === "250S" || item.busStopId === "250")
                    .map(item => {
                        const timeStr = item.departureTime || item.time;
                        if (!timeStr) return null;
                        const [h, m] = timeStr.split(':').map(Number);
                        const schedDate = new Date();
                        schedDate.setHours(h, m, 0, 0);

                        const diff = Math.round((schedDate - now) / 60000);
                        if (diff < -5) return null; 
                        return diff <= 0 ? `${timeStr} (已開)` : `${diff} 分鐘`;
                    })
                    .filter(item => item !== null).slice(0, 2);
            }
            renderETAList(el, busTimes);
        }

        // 4. 輕鐵 507 
        async function updateLRT_507_Schedule() {
            const el = document.getElementById('lrt-507');
            const targetUrl = `https://rt.data.gov.hk/v1/transport/mtr/lrt/getSchedule?station_id=${LRT_STATION_ID}`;
            const response = await fetch(`${PROXY}${encodeURIComponent(targetUrl)}`);
            const jsonResult = await response.json();
            
            const now = new Date();
            let scheduleTimes = [];

            if (jsonResult.schedule && jsonResult.schedule.lrt_time) {
                const filteredRaw = jsonResult.schedule.lrt_time
                    .filter(item => item.route_no === "507" && (item.platform_id === 1 || item.platform_id === "1"));

                scheduleTimes = filteredRaw.map(item => {
                    const timeStr = item.time;
                    if (!timeStr) return null;
                    const [h, m] = timeStr.split(':').map(Number);
                    const scheduleDate = new Date();
                    scheduleDate.setHours(h, m, 0, 0);

                    const diffMin = Math.round((scheduleDate - now) / 60000);
                    if (diffMin < -3) return null; 
                    return diffMin <= 0 ? "即將發車" : `${diffMin} 分鐘`;
                }).filter(item => item !== null);

                if (scheduleTimes.length === 0 && filteredRaw.length > 0) {
                    scheduleTimes = filteredRaw.slice(0, 2).map(item => item.time);
                }
            }

            renderETAList(el, scheduleTimes);
        }

        function renderETAList(element, etaArray) {
            if (!etaArray || etaArray.length === 0) {
                element.innerHTML = '<div class="loading">暫無班次</div>';
                return;
            }
            let html = '';
            etaArray.forEach((eta, index) => {
                html += `<div class="${index === 0 ? 'eta-item first' : 'eta-item'}">${eta}</div>`;
            });
            element.innerHTML = html;
        }

        // 初次載入
        fetchAllETA();
        
        // 【關鍵修改】：將原本的 30000 毫秒改為 60000 毫秒 (1分鐘)
        setInterval(fetchAllETA, 60000);
    </script>
</body>
</html>
