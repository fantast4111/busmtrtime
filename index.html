<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>兆麟站 巴士/輕鐵報時器</title>
    <style>
        /* 針對 Kobo E-ink 螢幕優化的純黑白、高對比度、大字體風格 */
        body { 
            background-color: #ffffff; 
            color: #000000; 
            font-family: sans-serif; 
            margin: 0; 
            padding: 20px; 
            box-sizing: border-box;
        }
        .header { 
            text-align: center; 
            border-bottom: 5px solid #000000; 
            padding-bottom: 10px; 
            margin-bottom: 20px; 
        }
        .header h1 { 
            margin: 0; 
            font-size: 42px; 
            font-weight: 900; 
        }
        .header .status { 
            font-size: 16px; 
            margin-top: 5px; 
            font-weight: bold; 
        }
        .route-card { 
            border: 4px solid #000000; 
            padding: 15px; 
            display: flex; 
            align-items: center; 
            justify-content: space-between; 
            margin-bottom: 20px; 
        }
        .route-number { 
            font-size: 64px; 
            font-weight: 900; 
            line-height: 1; 
        }
        .route-dest { 
            font-size: 22px; 
            font-weight: bold; 
            margin-top: 5px; 
        }
        .eta-list { 
            text-align: right; 
            min-width: 170px; 
        }
        .eta-item { 
            font-size: 32px; 
            font-weight: bold; 
        }
        .eta-item.first { 
            font-size: 48px; 
            font-weight: 900; 
            border-bottom: 2px solid #000000; 
        }
        .loading { 
            font-size: 20px; 
            font-style: italic; 
            color: #555555; 
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>兆麟站 Tiu Lun</h1>
        <div class="status" id="update-status">正在載入數據...</div>
    </div>

    <div class="route-card">
        <div>
            <div class="route-number">A33X</div>
            <div class="route-dest">往 機場 (海榮路站)</div>
        </div>
        <div class="eta-list" id="kmb-a33x">
            <div class="loading">讀取中...</div>
        </div>
    </div>

    <div class="route-card">
        <div>
            <div class="route-number">506</div>
            <div class="route-dest">往 屯門碼頭</div>
        </div>
        <div class="eta-list" id="mtr-506">
            <div class="loading">讀取中...</div>
        </div>
    </div>

    <div class="route-card">
        <div>
            <div class="route-number">507</div>
            <div class="route-dest">往 田景</div>
        </div>
        <div class="eta-list" id="lrt-507">
            <div class="loading">讀取中...</div>
        </div>
    </div>

    <script>
        // 設定各站點精確 ID
        const KMB_STOP_ID = "1D44677AEFBA8773"; // 修正後的九巴兆麟苑海榮路站
        const MTR_BUS_STOP_ID = "240";           // 港鐵巴士 兆麟站
        const LRT_STATION_ID = "0240";            // 輕鐵 兆麟站 (四位數)
        
        // 公開的 CORS 代理伺服器 (供港鐵與港鐵巴士 API 繞過 Kobo 瀏覽器限制使用)
        const PROXY = "https://api.allorigins.win/raw?url=";

        async function fetchAllETA() {
            document.getElementById('update-status').innerText = "正在更新...";
            
            // 同步異步執行三個 API，任何一個壞掉都不會引致其他路線卡死
            await Promise.all([
                updateKMB_A33X().catch(e => document.getElementById('kmb-a33x').innerHTML = `<div class="loading">錯誤</div>`),
                updateMTR_506().catch(e => document.getElementById('mtr-506').innerHTML = `<div class="loading">錯誤</div>`),
                updateLRT_507().catch(e => document.getElementById('lrt-507').innerHTML = `<div class="loading">錯誤</div>`)
            ]);

            // 更新最後整理時間
            const now = new Date();
            const timeStr = now.getHours().toString().padStart(2, '0') + ':' + 
                            now.getMinutes().toString().padStart(2, '0') + ':' + 
                            now.getSeconds().toString().padStart(2, '0');
            document.getElementById('update-status').innerText = `最後更新: ${timeStr} (30秒後自動重新整理)`;
        }

        // 1. 九巴 A33X 解析邏輯 (依據你指定的 JSON 結構與特定網址)
        async function updateKMB_A33X() {
            const el = document.getElementById('kmb-a33x');
            const response = await fetch(`https://data.etabus.gov.hk/v1/transport/kmb/eta/${KMB_STOP_ID}/A33X/1`);
            const jsonResult = await response.json();
            
            // 使用九巴伺服器生成此資料的時間點作為基準點
            const currentTime = new Date(jsonResult.generated_timestamp);

            const etas = (jsonResult.data || [])
                .map(item => {
                    if (!item.eta) return null;
                    
                    const busTime = new Date(item.eta);
                    const timeDiff = busTime - currentTime; // 毫秒差
                    const minutesLeft = Math.ceil(timeDiff / 60000); // 轉成分鐘並向上取整
                    
                    return minutesLeft <= 0 ? "即將抵達" : `${minutesLeft} 分鐘`;
                })
                .filter(item => item !== null)
                .slice(0, 2); // 取最接近的前兩班

            renderETAList(el, etas);
        }

        // 2. 港鐵巴士 506 解析邏輯 (經由 Proxy 中轉)
        async function updateMTR_506() {
            const el = document.getElementById('mtr-506');
            const targetUrl = encodeURIComponent(`https://rt.data.gov.hk/v1/transport/mtr/bus/getETA.php?route=506`);
            const response = await fetch(`${PROXY}${targetUrl}`);
            const data = await response.json();
            
            const etas = (data.bus || [])
                .filter(item => item.busStopId === MTR_BUS_STOP_ID)
                .map(item => {
                    const diff = Math.ceil(parseInt(item.departureTimeInSecond) / 60);
                    return diff <= 0 ? "即將抵達" : `${diff} 分鐘`;
                })
                .slice(0, 2);

            renderETAList(el, etas);
        }

        // 3. 輕鐵 507 解析邏輯 (經由 Proxy 中轉)
        async function updateLRT_507() {
            const el = document.getElementById('lrt-507');
            const targetUrl = encodeURIComponent(`https://rt.data.gov.hk/v1/transport/mtr/lrt/getETA.php?station_id=${LRT_STATION_ID}`);
            const response = await fetch(`${PROXY}${targetUrl}`);
            const data = await response.json();
            
            const etas = (data.platform_list || [])
                .flatMap(platform => platform.route_list || [])
                .filter(route => route.route_no === "507")
                .map(route => {
                    const min = parseInt(route.time_en);
                    return (isNaN(min) || min <= 0) ? "即將抵達" : `${min} 分鐘`;
                })
                .slice(0, 2);

            renderETAList(el, etas);
        }

        // 輔助函式：將解析出來的時間陣列渲染至 E-ink 介面
        function renderETAList(element, etaArray) {
            if (!etaArray || etaArray.length === 0) {
                element.innerHTML = '<div class="loading">暫無班次</div>';
                return;
            }
            let html = '';
            etaArray.forEach((eta, index) => {
                const className = index === 0 ? 'eta-item first' : 'eta-item';
                html += `<div class="${className}">${eta}</div>`;
            });
            element.innerHTML = html;
        }

        // 啟動與定時排程
        fetchAllETA();
        setInterval(fetchAllETA, 30000); // 30 秒自動更新一次
    </script>
</body>
</html>
